{% extends "blog/base.html" %}

{% block titulo %}Nuevo mensaje — CoderBlog{% endblock %}

{% block contenido %}
<div class="page-header">
    <h1>Nuevo mensaje</h1>
    <p>Elegí un usuario y escribí tu mensaje.</p>
</div>

<div class="form-wrapper">
    <form method="post">
        {% csrf_token %}
        <div class="form-group">
            <label for="{{ form.receptor.id_for_label }}">Para</label>
            {{ form.receptor }}
        </div>
        <div class="form-group">
            <label for="{{ form.contenido.id_for_label }}">Mensaje</label>
            {{ form.contenido }}
        </div>
        <button class="btn btn-primary" type="submit">Enviar</button>
    </form>
</div>
{% endblock %}
