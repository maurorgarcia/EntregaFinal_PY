{% extends "blog/base.html" %}

{% block titulo %}Ingresar — CoderBlog{% endblock %}

{% block contenido %}
<div class="page-header">
    <h1>Ingresar</h1>
    <p>Accedé con tu usuario y contraseña.</p>
</div>

<div class="form-wrapper">
    <form method="post">
        {% csrf_token %}
        <div class="form-group">
            <label for="id_username">Usuario</label>
            <input class="form-control" type="text" name="username" id="id_username" required>
        </div>
        <div class="form-group">
            <label for="id_password">Contraseña</label>
            <input class="form-control" type="password" name="password" id="id_password" required>
        </div>
        <button class="btn btn-primary" type="submit">Ingresar</button>
    </form>

    <div style="margin-top: 1rem;">
        <a href="{% url 'accounts:signup' %}">¿No tenés cuenta? Registrate</a>
    </div>
</div>
{% endblock %}
