{% extends "blog/base.html" %}

{% block titulo %}Borrar página — CoderBlog{% endblock %}

{% block contenido %}
<div class="page-header">
    <h1>Borrar página</h1>
    <p>Esta acción no se puede deshacer.</p>
</div>

<div class="form-wrapper">
    <p style="margin-bottom: 1rem;">¿Seguro que querés borrar <strong>{{ object.titulo }}</strong>?</p>
    <form method="post">
        {% csrf_token %}
        <div style="display: flex; gap: 0.75rem; flex-wrap: wrap;">
            <button class="btn btn-primary" style="width: auto;" type="submit">Sí, borrar</button>
            <a class="btn btn-outline" style="width: auto; text-decoration: none;" href="{% url 'blog:page_detail' object.pk %}">Cancelar</a>
        </div>
    </form>
</div>
{% endblock %}
